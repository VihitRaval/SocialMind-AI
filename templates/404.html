<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | SocialMind AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container-fluid px-md-5">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SocialMind AI Logo" class="navbar-logo me-2">
                <span class="navbar-brand-text">SocialMind AI</span>
            </a>
        </div>
    </nav>

    <div class="container main-content-wrapper d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 80vh; padding-top: 100px;">
        <div class="p-5 rounded-4 shadow-lg" style="background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); max-width: 600px; border: 1px solid rgba(255, 255, 255, 0.1);">
            <div class="display-1 text-primary fw-bold mb-3"><i class="bi bi-exclamation-triangle-fill"></i> 404</div>
            <h1 class="h2 text-white mb-3">Page Not Found</h1>
            <p class="text-secondary mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="/" class="btn btn-primary px-4 py-2" style="border-radius: 10px !important;">🏠 Go to Homepage</a>
        </div>
    </div>
</body>
</html>
